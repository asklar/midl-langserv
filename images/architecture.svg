<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#1e1e1e"/>

  <!-- Pipeline boxes -->
  <!-- Source -->
  <rect x="16" y="40" width="90" height="50" rx="6" fill="#252526" style="stroke:#454545;stroke-width:1"/>
  <text x="61" y="62" style="font-family:Consolas,monospace;font-size:12px;fill:#d4d4d4;text-anchor:middle">Source</text>
  <text x="61" y="78" style="font-family:Consolas,monospace;font-size:10px;fill:#808080;text-anchor:middle">(.idl)</text>

  <!-- Arrow -->
  <line x1="106" y1="65" x2="126" y2="65" style="stroke:#007ACC;stroke-width:2"/>
  <polygon points="124,60 134,65 124,70" style="fill:#007ACC"/>

  <!-- Preprocessor -->
  <rect x="134" y="40" width="100" height="50" rx="6" fill="#252526" style="stroke:#454545;stroke-width:1"/>
  <text x="184" y="62" style="font-family:Consolas,monospace;font-size:11px;fill:#d4d4d4;text-anchor:middle">Preprocessor</text>
  <text x="184" y="78" style="font-family:Consolas,monospace;font-size:9px;fill:#808080;text-anchor:middle">#include, #define</text>

  <line x1="234" y1="65" x2="254" y2="65" style="stroke:#007ACC;stroke-width:2"/>
  <polygon points="252,60 262,65 252,70" style="fill:#007ACC"/>

  <!-- Lexer -->
  <rect x="262" y="40" width="80" height="50" rx="6" fill="#252526" style="stroke:#454545;stroke-width:1"/>
  <text x="302" y="62" style="font-family:Consolas,monospace;font-size:12px;fill:#d4d4d4;text-anchor:middle">Lexer</text>
  <text x="302" y="78" style="font-family:Consolas,monospace;font-size:9px;fill:#808080;text-anchor:middle">Tokenize</text>

  <line x1="342" y1="65" x2="362" y2="65" style="stroke:#007ACC;stroke-width:2"/>
  <polygon points="360,60 370,65 360,70" style="fill:#007ACC"/>

  <!-- Parser -->
  <rect x="370" y="40" width="80" height="50" rx="6" fill="#252526" style="stroke:#454545;stroke-width:1"/>
  <text x="410" y="62" style="font-family:Consolas,monospace;font-size:12px;fill:#d4d4d4;text-anchor:middle">Parser</text>
  <text x="410" y="78" style="font-family:Consolas,monospace;font-size:9px;fill:#808080;text-anchor:middle">Syntax tree</text>

  <line x1="450" y1="65" x2="470" y2="65" style="stroke:#007ACC;stroke-width:2"/>
  <polygon points="468,60 478,65 468,70" style="fill:#007ACC"/>

  <!-- Green Tree -->
  <rect x="478" y="40" width="100" height="50" rx="6" fill="#252526" style="stroke:#454545;stroke-width:1"/>
  <text x="528" y="62" style="font-family:Consolas,monospace;font-size:11px;fill:#d4d4d4;text-anchor:middle">Green Tree</text>
  <text x="528" y="78" style="font-family:Consolas,monospace;font-size:9px;fill:#808080;text-anchor:middle">Lossless CST</text>

  <line x1="578" y1="65" x2="598" y2="65" style="stroke:#007ACC;stroke-width:2"/>
  <polygon points="596,60 606,65 596,70" style="fill:#007ACC"/>

  <!-- Binder -->
  <rect x="606" y="40" width="110" height="50" rx="6" fill="#252526" style="stroke:#454545;stroke-width:1"/>
  <text x="661" y="62" style="font-family:Consolas,monospace;font-size:11px;fill:#d4d4d4;text-anchor:middle">Binder</text>
  <text x="661" y="78" style="font-family:Consolas,monospace;font-size:9px;fill:#808080;text-anchor:middle">Type resolution</text>

  <!-- Arrow down from center of pipeline -->
  <line x1="400" y1="90" x2="400" y2="140" style="stroke:#007ACC;stroke-width:2"/>
  <polygon points="395,138 400,148 405,138" style="fill:#007ACC"/>

  <!-- Fan out lines -->
  <line x1="400" y1="148" x2="110" y2="180" style="stroke:#007ACC;stroke-width:1.5"/>
  <line x1="400" y1="148" x2="310" y2="180" style="stroke:#007ACC;stroke-width:1.5"/>
  <line x1="400" y1="148" x2="500" y2="180" style="stroke:#007ACC;stroke-width:1.5"/>
  <line x1="400" y1="148" x2="690" y2="180" style="stroke:#007ACC;stroke-width:1.5"/>

  <!-- Output boxes -->
  <!-- WinMD -->
  <rect x="50" y="180" width="120" height="50" rx="6" fill="#252526" style="stroke:#007ACC;stroke-width:2"/>
  <text x="110" y="202" style="font-family:Consolas,monospace;font-size:13px;fill:#007ACC;text-anchor:middle;font-weight:bold">WinMD</text>
  <text x="110" y="220" style="font-family:Consolas,monospace;font-size:9px;fill:#808080;text-anchor:middle">Metadata output</text>

  <!-- Headers -->
  <rect x="250" y="180" width="120" height="50" rx="6" fill="#252526" style="stroke:#007ACC;stroke-width:2"/>
  <text x="310" y="202" style="font-family:Consolas,monospace;font-size:13px;fill:#007ACC;text-anchor:middle;font-weight:bold">Headers</text>
  <text x="310" y="220" style="font-family:Consolas,monospace;font-size:9px;fill:#808080;text-anchor:middle">C++ projections</text>

  <!-- IIDs -->
  <rect x="440" y="180" width="120" height="50" rx="6" fill="#252526" style="stroke:#007ACC;stroke-width:2"/>
  <text x="500" y="202" style="font-family:Consolas,monospace;font-size:13px;fill:#007ACC;text-anchor:middle;font-weight:bold">IIDs</text>
  <text x="500" y="220" style="font-family:Consolas,monospace;font-size:9px;fill:#808080;text-anchor:middle">Interface GUIDs</text>

  <!-- LSP -->
  <rect x="630" y="180" width="120" height="50" rx="6" fill="#252526" style="stroke:#007ACC;stroke-width:2"/>
  <text x="690" y="202" style="font-family:Consolas,monospace;font-size:13px;fill:#007ACC;text-anchor:middle;font-weight:bold">LSP</text>
  <text x="690" y="220" style="font-family:Consolas,monospace;font-size:9px;fill:#808080;text-anchor:middle">Editor support</text>

  <!-- Caption -->
  <text x="400" y="275" style="font-family:Consolas,monospace;font-size:14px;fill:#808080;text-anchor:middle">WinMIDL Compiler Pipeline</text>
</svg>