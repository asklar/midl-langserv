  <!-- F2 badge -->
  <rect x="314" y="42" width="30" height="22" fill="#007ACC" rx="4"/>
  <text x="321" y="57" style="font-family:Consolas,'Cascadia Code',monospace;font-size:10px;fill:#fff;font-weight:bold">F2</text>
  <!-- "3 references" indicator -->
  <text x="350" y="58" style="font-family:Consolas,'Cascadia Code',monospace;font-size:11px;fill:#808080">3 references will be updated</text>
  <!-- Caption -->
  <text x="400" y="268" style="font-family:Consolas,'Cascadia Code',monospace;font-size:12px;fill:#808080;text-anchor:middle">F2 → rename all references across the file</text>
