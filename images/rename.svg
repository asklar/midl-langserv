  <text x="48" y="122" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#d4d4d4">}</text>
  <!-- Line 5 blank -->
  <!-- Line 6: runtimeclass Catalog -->
  <text x="48" y="142" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#C586C0">runtimeclass</text>
  <text x="152" y="142" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#4EC9B0">Catalog</text>
  <text x="48" y="162" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#d4d4d4">{</text>
