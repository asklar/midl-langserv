  <!-- Line 1: interface Foo (highlighted) -->
  <rect x="44" y="49" width="130" height="18" fill="#613214" rx="2"/>
  <text x="48" y="62" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#C586C0">interface</text>
  <text x="120" y="62" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#4EC9B0">Foo</text>
  <!-- Line 2 -->
  <text x="48" y="82" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#d4d4d4">{</text>
  <!-- Line 3: Foo GetItem(); with Foo highlighted -->
  <rect x="60" y="89" width="26" height="18" fill="#613214" rx="2"/>
  <text x="64" y="102" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#4EC9B0">Foo</text>
  <text x="90" y="102" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#d4d4d4"> </text>
  <text x="98" y="102" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#DCDCAA">GetItem</text>
  <text x="154" y="102" style="font-family:Consolas,'Cascadia Code',monospace;font-size:13px;fill:#d4d4d4">();</text>
