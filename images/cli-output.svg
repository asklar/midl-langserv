<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Terminal window -->
  <rect width="800" height="380" rx="8" fill="#0c0c0c"/>
  <!-- Title bar -->
  <rect width="800" height="30" rx="8" fill="#323233"/>
  <rect y="22" width="800" height="8" fill="#323233"/>
  <!-- Windows title bar buttons (right side) -->
  <rect x="704" y="12" width="10" height="1" fill="#999"/>
  <rect x="730" y="8" width="10" height="10" fill="none" style="stroke:#999;stroke-width:1"/>
  <line x1="758" y1="8" x2="768" y2="18" style="stroke:#999;stroke-width:1.2"/>
  <line x1="768" y1="8" x2="758" y2="18" style="stroke:#999;stroke-width:1.2"/>
  <text x="400" y="19" style="font-family:Consolas,monospace;font-size:11px;fill:#808080;text-anchor:middle">Terminal</text>

  <!-- Prompt -->
  <text x="16" y="56" style="font-family:Consolas,monospace;font-size:13px;fill:#007ACC">❯</text>
  <text x="32" y="56" style="font-family:Consolas,monospace;font-size:13px;fill:#d4d4d4"> winmidl --analyze Widget.idl</text>

  <!-- Blank line -->

  <!-- Error 1 -->
  <text x="16" y="90" style="font-family:Consolas,monospace;font-size:13px;fill:#F44747">error MIDL2005</text>
  <text x="130" y="90" style="font-family:Consolas,monospace;font-size:13px;fill:#d4d4d4">: Lowercase 'int' is MIDL2 syntax. Use 'Int32' for MIDL3.</text>
  <text x="32" y="110" style="font-family:Consolas,monospace;font-size:13px;fill:#808080">--&gt; </text>
  <text x="64" y="110" style="font-family:Consolas,monospace;font-size:13px;fill:#CE9178">Widget.idl</text>
  <text x="148" y="110" style="font-family:Consolas,monospace;font-size:13px;fill:#808080">:8:9</text>
  <text x="32" y="130" style="font-family:Consolas,monospace;font-size:13px;fill:#808080"> |</text>
  <text x="16" y="150" style="font-family:Consolas,monospace;font-size:13px;fill:#B5CEA8"> 8</text>
  <text x="40" y="150" style="font-family:Consolas,monospace;font-size:13px;fill:#808080"> | </text>
  <text x="72" y="150" style="font-family:Consolas,monospace;font-size:13px;fill:#d4d4d4">        int Count;</text>
  <text x="32" y="170" style="font-family:Consolas,monospace;font-size:13px;fill:#808080"> | </text>
  <text x="72" y="170" style="font-family:Consolas,monospace;font-size:13px;fill:#F44747">        ^^^ </text>
  <text x="165" y="170" style="font-family:Consolas,monospace;font-size:13px;fill:#F44747">Use 'Int32' instead</text>

  <!-- Blank line -->

  <!-- Error 2 -->
  <text x="16" y="204" style="font-family:Consolas,monospace;font-size:13px;fill:#F44747">error MIDL2004</text>
  <text x="130" y="204" style="font-family:Consolas,monospace;font-size:13px;fill:#d4d4d4">: Pointer types ('IFoo*') are not used in MIDL3.</text>
  <text x="32" y="224" style="font-family:Consolas,monospace;font-size:13px;fill:#808080">--&gt; </text>
  <text x="64" y="224" style="font-family:Consolas,monospace;font-size:13px;fill:#CE9178">Widget.idl</text>
  <text x="148" y="224" style="font-family:Consolas,monospace;font-size:13px;fill:#808080">:12:9</text>
  <text x="32" y="244" style="font-family:Consolas,monospace;font-size:13px;fill:#808080"> |</text>
  <text x="8" y="264" style="font-family:Consolas,monospace;font-size:13px;fill:#B5CEA8">12</text>
  <text x="40" y="264" style="font-family:Consolas,monospace;font-size:13px;fill:#808080"> | </text>
  <text x="72" y="264" style="font-family:Consolas,monospace;font-size:13px;fill:#d4d4d4">        IFoo* pFoo;</text>
  <text x="32" y="284" style="font-family:Consolas,monospace;font-size:13px;fill:#808080"> | </text>
  <text x="72" y="284" style="font-family:Consolas,monospace;font-size:13px;fill:#F44747">        ^^^^^ </text>
  <text x="173" y="284" style="font-family:Consolas,monospace;font-size:13px;fill:#F44747">Reference types are passed directly</text>

  <!-- Summary -->
  <text x="16" y="324" style="font-family:Consolas,monospace;font-size:13px;fill:#d4d4d4">MIDL: </text>
  <text x="64" y="324" style="font-family:Consolas,monospace;font-size:13px;fill:#F44747">2 error(s)</text>
  <text x="152" y="324" style="font-family:Consolas,monospace;font-size:13px;fill:#d4d4d4">, </text>
  <text x="168" y="324" style="font-family:Consolas,monospace;font-size:13px;fill:#4EC9B0">0 warning(s)</text>

  <!-- Prompt -->
  <text x="16" y="356" style="font-family:Consolas,monospace;font-size:13px;fill:#007ACC">❯</text>
  <rect x="32" y="346" width="8" height="14" fill="#d4d4d4" style="opacity:0.7"/>
</svg>