  <text x="510" y="188" style="font-family:Consolas,'Cascadia Code',monospace;font-size:11px;fill:#DCDCAA">GetAt</text>
  <text x="554" y="188" style="font-family:Segoe UI,sans-serif;font-size:11px;fill:#808080"> — Returns the item at index</text>
  <text x="510" y="206" style="font-family:Consolas,'Cascadia Code',monospace;font-size:11px;fill:#DCDCAA">Append</text>
  <text x="562" y="206" style="font-family:Segoe UI,sans-serif;font-size:11px;fill:#808080"> — Appends an item</text>
  <text x="510" y="224" style="font-family:Consolas,'Cascadia Code',monospace;font-size:11px;fill:#DCDCAA">InsertAt</text>
  <text x="578" y="224" style="font-family:Segoe UI,sans-serif;font-size:11px;fill:#808080"> — Inserts an item</text>
  <text x="510" y="242" style="font-family:Consolas,'Cascadia Code',monospace;font-size:11px;fill:#DCDCAA">RemoveAt</text>
  <text x="578" y="242" style="font-family:Segoe UI,sans-serif;font-size:11px;fill:#808080"> — Removes item at index</text>
  <text x="510" y="260" style="font-family:Consolas,'Cascadia Code',monospace;font-size:11px;fill:#DCDCAA">Clear</text>
  <text x="550" y="260" style="font-family:Segoe UI,sans-serif;font-size:11px;fill:#808080"> — Removes all items</text>
  <rect x="498" y="272" width="280" height="1" fill="#454545"/>
  <text x="498" y="292" style="font-family:Segoe UI,sans-serif;font-size:12px;fill:#d4d4d4;font-weight:bold">Properties</text>
